<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Hasta La Vista</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Quicksand', Arial, sans-serif;
    background: #f0f8ff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  header {
    background: #29ABE2;
    width: 100%;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  header img.logo {
    height: 36px;
    width: auto;
  }

  header span {
    color: white;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
    font-family: 'Quicksand', Arial, sans-serif;
  }

  .start-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
    gap: 16px;
    width: 100%;
    max-width: 500px;
  }

  .chepe-start {
    width: 180px;
    height: auto;
  }

  .lesson-badge {
    background: white;
    border-radius: 20px;
    padding: 6px 18px;
    color: #29ABE2;
    font-size: 18px;
    font-weight: 700;
    border: 2px solid #29ABE2;
    font-family: 'Quicksand', Arial, sans-serif;
  }

  #startButton {
    background: #29ABE2;
    color: white;
    border: none;
    border-radius: 30px;
    padding: 14px 36px;
    font-size: 18px;
    cursor: pointer;
    font-family: 'Quicksand', Arial, sans-serif;
    font-weight: 600;
  }

  #startButton:disabled {
    background: #aaa;
    cursor: not-allowed;
  }

  .exercise-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 500px;
    padding: 12px 16px;
    gap: 10px;
  }

  .exercise-image-wrapper {
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    display: none;
  }

  .exercise-image-wrapper img {
    width: 100%;
    display: block;
    border-radius: 16px;
  }

  .chepe-speech-area {
    width: 100%;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 0 4px;
  }

  .chepe-figure {
    width: 80px;
    flex-shrink: 0;
    transition: opacity 0.2s;
  }

  .chepe-figure img {
    width: 100%;
    height: auto;
  }

  .speech-bubble {
    background: white;
    border-radius: 20px 20px 20px 4px;
    padding: 14px 16px;
    font-size: 15px;
    line-height: 1.5;
    color: #222;
    flex: 1;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    min-height: 54px;
    font-family: 'Quicksand', Arial, sans-serif;
    font-weight: 500;
  }

  .speech-bubble.thinking {
    color: #aaa;
    font-style: italic;
  }

  .conversation-history {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 260px;
    overflow-y: auto;
    padding: 4px 0;
  }

  .bubble-chepe {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }

  .bubble-chepe .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    background: #29ABE2;
  }

  .bubble-chepe .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .bubble-chepe .text {
    background: white;
    border-radius: 16px 16px 16px 4px;
    padding: 10px 14px;
    font-size: 14px;
    color: #222;
    max-width: 80%;
    font-family: 'Quicksand', Arial, sans-serif;
    font-weight: 500;
    line-height: 1.5;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .bubble-student {
    display: flex;
    justify-content: flex-end;
  }

  .bubble-student .text {
    background: #29ABE2;
    color: white;
    border-radius: 16px 16px 4px 16px;
    padding: 10px 14px;
    font-size: 14px;
    max-width: 80%;
    font-family: 'Quicksand', Arial, sans-serif;
    font-weight: 500;
    line-height: 1.5;
  }

  #statusText {
    font-size: 13px;
    color: #888;
    text-align: center;
    min-height: 18px;
    font-family: 'Quicksand', Arial, sans-serif;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
    width: 100%;
    padding-bottom: 8px;
  }

  #micButton {
    background: #29ABE2;
    color: white;
    border: none;
    border-radius: 50%;
    width: 54px;
    height: 54px;
    font-size: 22px;
    cursor: pointer;
    flex-shrink: 0;
  }

  #micButton.recording {
    background: #e74c3c;
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  #userInput {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid #29ABE2;
    border-radius: 30px;
    font-size: 15px;
    outline: none;
    font-family: 'Quicksand', Arial, sans-serif;
  }

  #sendButton {
    background: #29ABE2;
    color: white;
    border: none;
    border-radius: 30px;
    padding: 12px 18px;
    font-size: 15px;
    cursor: pointer;
    font-family: 'Quicksand', Arial, sans-serif;
    font-weight: 600;
  }

  #sendButton:disabled { background: #aaa; }

  .session-complete {
    text-align: center;
    background: #e8f5e9;
    border-radius: 16px;
    padding: 16px;
    color: #2e7d32;
    font-size: 16px;
    display: none;
    width: 100%;
    font-family: 'Quicksand', Arial, sans-serif;
    font-weight: 600;
  }
</style>
</head>
<body>

<header>
  <img class="logo" src="https://static.wixstatic.com/media/cd2a90_7eed42c804464efa9c4d32397c6e0c4b~mv2.png" alt="Hasta La Vista">
  <span>Hasta La Vista</span>
</header>

<div class="start-screen" id="startScreen">
  <img class="chepe-start" src="https://static.wixstatic.com/media/cd2a90_6534aad0aaa142bf94ff94a7c30de465~mv2.png" alt="Chepe">
  <div class="lesson-badge" id="lessonCodeDisplay">...</div>
  <button id="startButton">Practicar 🎤</button>
</div>

<div class="exercise-screen" id="exerciseScreen">

  <div class="exercise-image-wrapper" id="exerciseImageWrapper">
    <img id="exerciseImage" src="" alt="Ejercicio">
  </div>

  <div class="chepe-speech-area">
    <div class="chepe-figure" id="chepeFigure">
      <img id="chepeImg" src="https://static.wixstatic.com/media/cd2a90_6534aad0aaa142bf94ff94a7c30de465~mv2.png" alt="Chepe">
    </div>
    <div class="speech-bubble thinking" id="speechBubble">
      ¡Preparando tu ejercicio...!
    </div>
  </div>

  <div class="conversation-history" id="conversationHistory"></div>

  <div id="statusText"></div>

  <div class="session-complete" id="sessionComplete">
    ✅ Sesja zakończona! Brawo!
  </div>

  <div class="input-row" id="inputRow">
    <button id="micButton">🎤</button>
    <input id="userInput" type="text" placeholder="Escribe aquí...">
    <button id="sendButton">Enviar</button>
  </div>

</div>

<script>
const WORKER_URL = 'https://chepe-ai.jose-1d1.workers.dev';
const CHEPE_IMAGES = [
  'https://static.wixstatic.com/media/cd2a90_6534aad0aaa142bf94ff94a7c30de465~mv2.png',
  'https://static.wixstatic.com/media/cd2a90_2740b835ab8d4659b31c4a4748965ca8~mv2.png'
];

const params = new URLSearchParams(window.location.search);
const lessonCode = (params.get('lesson') || 'BQ3C01').toUpperCase();
document.getElementById('lessonCodeDisplay').textContent = lessonCode;

let conversationHistory = [];
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let chepeImageIndex = 0;
let isFirstMessage = true;

function switchChepeImage() {
  chepeImageIndex = (chepeImageIndex + 1) % CHEPE_IMAGES.length;
  const img = document.getElementById('chepeImg');
  img.style.opacity = '0';
  setTimeout(() => {
    img.src = CHEPE_IMAGES[chepeImageIndex];
    img.style.opacity = '1';
  }, 150);
}

function setChepeMessage(text, isThinking) {
  const bubble = document.getElementById('speechBubble');
  bubble.textContent = text;
  bubble.className = 'speech-bubble' + (isThinking ? ' thinking' : '');
  if (!isThinking) switchChepeImage();
}

function addToHistory(speaker, text) {
  const history = document.getElementById('conversationHistory');

  if (speaker === 'chepe') {
    const div = document.createElement('div');
    div.className = 'bubble-chepe';
    div.innerHTML = `
      <div class="avatar">
        <img src="${CHEPE_IMAGES[chepeImageIndex]}" alt="Chepe">
      </div>
      <div class="text">${text}</div>
    `;
    history.appendChild(div);
  } else {
    const div = document.createElement('div');
    div.className = 'bubble-student';
    div.innerHTML = `<div class="text">${text}</div>`;
    history.appendChild(div);
  }

  history.scrollTop = history.scrollHeight;
}

function setStatus(text) {
  document.getElementById('statusText').textContent = text;
}

function playAudio(base64Audio) {
  const audio = new Audio(`data:audio/mpeg;base64,${base64Audio}`);
  audio.play().catch(e => console.log('Audio error:', e));
}

function endSession() {
  document.getElementById('inputRow').style.display = 'none';
  document.getElementById('sessionComplete').style.display = 'block';
  setStatus('');
}

async function sendToChepe(userMessage) {
  if (userMessage) {
    addToHistory('student', userMessage);
    conversationHistory.push({ role: 'user', content: userMessage });
  }

  setChepeMessage('...', true);
  setStatus('');
  document.getElementById('sendButton').disabled = true;
  document.getElementById('micButton').disabled = true;

  try {
    const response = await fetch(`${WORKER_URL}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        lessonCode,
        studentText: userMessage || 'START_SESSION',
        conversationHistory
      })
    });

    const data = await response.json();

    if (data.error) {
      setChepeMessage('⚠️ ' + data.error, false);
      return;
    }

    if (data.imageUrl && data.imageUrl.length > 0 && isFirstMessage) {
      const wrapper = document.getElementById('exerciseImageWrapper');
      const img = document.getElementById('exerciseImage');
      img.src = data.imageUrl;
      wrapper.style.display = 'block';
      isFirstMessage = false;
    }

    conversationHistory.push({ role: 'assistant', content: data.reply });
    setChepeMessage(data.reply, false);
    addToHistory('chepe', data.reply);

    if (data.audio) {
      playAudio(data.audio);
    }

    if (data.sessionEnded) {
      setTimeout(() => endSession(), 3000);
    }

  } catch (err) {
    setChepeMessage('⚠️ Error de conexión', false);
    setStatus(err.message);
  } finally {
    document.getElementById('sendButton').disabled = false;
    document.getElementById('micButton').disabled = false;
  }
}

document.getElementById('startButton').addEventListener('click', async () => {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('exerciseScreen').style.display = 'flex';
  await sendToChepe(null);
});

document.getElementById('sendButton').addEventListener('click', async () => {
  const input = document.getElementById('userInput');
  const message = input.value.trim();
  if (!message) return;
  input.value = '';
  await sendToChepe(message);
});

document.getElementById('userInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') document.getElementById('sendButton').click();
});

document.getElementById('micButton').addEventListener('click', async () => {
  const micBtn = document.getElementById('micButton');

  if (isRecording) {
    mediaRecorder.stop();
    isRecording = false;
    micBtn.classList.remove('recording');
    micBtn.textContent = '🎤';
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = e => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      setStatus('⏳ Transcribiendo...');
      micBtn.disabled = true;

      const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
      const formData = new FormData();
      formData.append('file', audioBlob, 'audio.webm');
      formData.append('model', 'whisper-1');
      formData.append('language', 'es');

      try {
        const response = await fetch(`${WORKER_URL}/transcribe`, {
          method: 'POST',
          body: formData
        });
        const data = await response.json();
        if (data.transcript) {
          await sendToChepe(data.transcript);
        } else {
          setStatus('⚠️ No se entendió. Intenta de nuevo.');
        }
      } catch (err) {
        setStatus('⚠️ Error: ' + err.message);
      } finally {
        micBtn.disabled = false;
        micBtn.textContent = '🎤';
        setStatus('');
      }
      stream.getTracks().forEach(t => t.stop());
    };

    mediaRecorder.start();
    isRecording = true;
    micBtn.classList.add('recording');
    micBtn.textContent = '⏹';
    setStatus('🎤 Nagrywanie... dotknij ponownie, aby zatrzymać');

  } catch (err) {
    setStatus('⚠️ Brak dostępu do mikrofonu: ' + err.message);
  }
});
</script>
</body>
</html>
