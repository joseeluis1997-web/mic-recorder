<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practica con Chepe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
    background: #f0f8ff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    background: #29ABE2;
    width: 100%;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  header h1 {
    color: white;
    font-size: 22px;
    letter-spacing: 1px;
  }

  .chepe-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    gap: 8px;
  }

  .chepe-container img {
    width: 140px;
  }

  .lesson-code {
    color: #29ABE2;
    font-size: 22px;
    font-weight: bold;
  }

  .topic-label {
    color: #666;
    font-size: 14px;
  }

  #startButton {
    background: #29ABE2;
    color: white;
    border: none;
    border-radius: 30px;
    padding: 12px 30px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 8px;
  }

  #startButton:disabled {
    background: #aaa;
    cursor: not-allowed;
  }

  .chat-area {
    width: 100%;
    max-width: 600px;
    padding: 0 20px;
    display: none;
    flex-direction: column;
    gap: 12px;
  }

  #conversationBox {
    background: white;
    border-radius: 16px;
    padding: 16px;
    min-height: 200px;
    max-height: 350px;
    overflow-y: auto;
    font-size: 15px;
    line-height: 1.6;
    white-space: pre-wrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  #userInput {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid #29ABE2;
    border-radius: 30px;
    font-size: 15px;
    outline: none;
  }

  #sendButton {
    background: #29ABE2;
    color: white;
    border: none;
    border-radius: 30px;
    padding: 12px 20px;
    font-size: 15px;
    cursor: pointer;
  }

  #sendButton:disabled {
    background: #aaa;
  }

  #micButton {
    background: #29ABE2;
    color: white;
    border: none;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    font-size: 20px;
    cursor: pointer;
    flex-shrink: 0;
  }

  #micButton.recording {
    background: #e74c3c;
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  #statusText {
    text-align: center;
    color: #888;
    font-size: 13px;
    min-height: 20px;
  }
</style>
</head>
<body>

<header>
  <h1>🦜 Hasta La Vista — Practica con Chepe</h1>
</header>

<div class="chepe-container">
  <img src="https://static.wixstatic.com/media/cd2a90_7b35e2e0a4a94aab8b3d8b7a5d0c1234~mv2.png" 
       onerror="this.style.fontSize='80px'; this.style.lineHeight='1'; this.innerHTML='🦜';"
       alt="Chepe">
  <div class="lesson-code" id="lessonCodeDisplay">...</div>
  <div class="topic-label" id="topicDisplay"></div>
  <button id="startButton">🦜 Comenzar con Chepe</button>
</div>

<div class="chat-area" id="chatArea">
  <div id="statusText"></div>
  <div id="conversationBox"></div>
  <div class="input-row">
    <button id="micButton">🎤</button>
    <input id="userInput" type="text" placeholder="Escribe tu mensaje...">
    <button id="sendButton">Enviar</button>
  </div>
</div>

<script>
const WORKER_URL = 'https://chepe-ai.jose-1d1.workers.dev';

// Get lesson code from URL
const params = new URLSearchParams(window.location.search);
const lessonCode = (params.get('lesson') || 'BQ3C01').toUpperCase();
document.getElementById('lessonCodeDisplay').textContent = lessonCode;

let conversationHistory = [];
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;

// Add message to conversation
function addMessage(speaker, text) {
  const box = document.getElementById('conversationBox');
  const current = box.textContent;
  box.textContent = current + (current ? '\n\n' : '') + speaker + text;
  box.scrollTop = box.scrollHeight;
}

function setStatus(text) {
  document.getElementById('statusText').textContent = text;
}

// Play base64 audio
function playAudio(base64Audio) {
  const audio = new Audio(`data:audio/mpeg;base64,${base64Audio}`);
  audio.play().catch(e => console.log('Audio play error:', e));
}

// Send message to Chepe
async function sendToChepe(userMessage) {
  if (userMessage) {
    addMessage('Tú: ', userMessage);
    conversationHistory.push({ role: 'user', content: userMessage });
  }

  setStatus('Chepe está pensando...');
  document.getElementById('sendButton').disabled = true;
  document.getElementById('micButton').disabled = true;

  try {
    const response = await fetch(`${WORKER_URL}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        lessonCode,
        studentText: userMessage || 'Hola',
        conversationHistory
      })
    });

    const data = await response.json();

    if (data.error) {
      setStatus('⚠️ Error: ' + data.error);
      return;
    }

    conversationHistory.push({ role: 'assistant', content: data.reply });
    addMessage('🦜 Chepe: ', data.reply);
    setStatus('');

    if (data.audio) {
      playAudio(data.audio);
    }

  } catch (err) {
    setStatus('⚠️ Error de conexión: ' + err.message);
  } finally {
    document.getElementById('sendButton').disabled = false;
    document.getElementById('micButton').disabled = false;
  }
}

// Start button
document.getElementById('startButton').addEventListener('click', async () => {
  document.getElementById('startButton').disabled = true;
  document.getElementById('chatArea').style.display = 'flex';
  await sendToChepe(null);
});

// Send button
document.getElementById('sendButton').addEventListener('click', async () => {
  const input = document.getElementById('userInput');
  const message = input.value.trim();
  if (!message) return;
  input.value = '';
  await sendToChepe(message);
});

// Enter key sends message
document.getElementById('userInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    document.getElementById('sendButton').click();
  }
});

// Microphone button
document.getElementById('micButton').addEventListener('click', async () => {
  const micBtn = document.getElementById('micButton');

  if (isRecording) {
    mediaRecorder.stop();
    isRecording = false;
    micBtn.classList.remove('recording');
    micBtn.textContent = '🎤';
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = e => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      setStatus('⏳ Transcribiendo...');
      micBtn.disabled = true;

      const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
      const formData = new FormData();
      formData.append('file', audioBlob, 'audio.webm');
      formData.append('model', 'whisper-1');
      formData.append('language', 'es');

      try {
        const response = await fetch(`${WORKER_URL}/transcribe`, {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (data.transcript) {
          await sendToChepe(data.transcript);
        } else {
          setStatus('⚠️ No se entendió. Intenta de nuevo.');
        }
      } catch (err) {
        setStatus('⚠️ Error de transcripción: ' + err.message);
      } finally {
        micBtn.disabled = false;
        micBtn.textContent = '🎤';
      }

      stream.getTracks().forEach(t => t.stop());
    };

    mediaRecorder.start();
    isRecording = true;
    micBtn.classList.add('recording');
    micBtn.textContent = '⏹';
    setStatus('🎤 Grabando... toca de nuevo para parar');

  } catch (err) {
    setStatus('⚠️ No se puede acceder al micrófono: ' + err.message);
  }
});
</script>
</body>
</html>
